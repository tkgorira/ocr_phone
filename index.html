<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>家計簿 - クレジットカード管理</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <p class="eyebrow">HOUSEHOLD ACCOUNT BOOK</p>
        <h1>家計簿<br />クレジットカード管理</h1>
        <p class="subtitle">
          イオンカード、dカードの支払い日を管理。毎日の支出を記録できます。
        </p>
      </header>

      <!-- カレンダー表示 -->
      <section class="panel calendar-panel">
        <div class="calendar-header">
          <button id="prevMonth" class="btn btn-small">← 前月</button>
          <h2 id="calendarTitle">2026年3月</h2>
          <button id="nextMonth" class="btn btn-small">次月 →</button>
        </div>
        <div class="calendar-container">
          <div class="calendar-weekdays">
            <div>日</div>
            <div>月</div>
            <div>火</div>
            <div>水</div>
            <div>木</div>
            <div>金</div>
            <div>土</div>
          </div>
          <div id="calendar" class="calendar-grid"></div>
        </div>
        <div id="paymentInfo" class="payment-info"></div>
      </section>

      <!-- 支出入力フォーム -->
      <section class="panel input-panel">
        <h2>支出を記録</h2>
        
        <div class="form-group">
          <label for="expenseDate">日付</label>
          <input type="date" id="expenseDate" />
        </div>

        <div class="form-group">
          <label for="category">科目</label>
          <select id="category">
            <option value="">選択してください</option>
            <option value="食費">食費</option>
            <option value="外食費">外食費</option>
            <option value="美容">美容</option>
            <option value="雑費">雑費</option>
            <option value="交通">交通</option>
            <option value="医療">医療</option>
            <option value="その他">その他</option>
          </select>
        </div>

        <div class="form-group">
          <label for="amount">金額</label>
          <input type="number" id="amount" placeholder="0" min="0" />
        </div>

        <div class="form-group">
          <label for="cardType">支払い方法</label>
          <select id="cardType">
            <option value="現金">現金</option>
            <option value="イオン">イオンカード</option>
            <option value="d">dカード</option>
          </select>
        </div>

        <button id="addBtn" class="btn btn-primary">記録する</button>
      </section>

      <!-- 支出一覧 -->
      <section class="panel history-panel">
        <h2>支出履歴</h2>
        <div id="expenseList" class="expense-list">
          <p class="placeholder">まだ記録がありません</p>
        </div>
      </section>

      <!-- 統計情報 -->
      <section class="panel stats-panel">
        <h2>カード別支出</h2>
        <div id="stats" class="stats-container"></div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
