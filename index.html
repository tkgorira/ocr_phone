<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>家計簿 - クレジットカード管理</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <p class="eyebrow">HOUSEHOLD ACCOUNT BOOK</p>
        <h1>家計簿<br />クレジットカード管理</h1>
        <p class="subtitle">
          イオンカード、dカードの支払い日を管理。毎日の支出を記録できます。
        </p>
        <section class="monthly-available" aria-label="今月の使用可能額">
          <article class="monthly-available-card">
            <p class="monthly-available-label">今月使用可能現金</p>
            <p id="availableCash" class="monthly-available-value">¥0</p>
          </article>
          <article class="monthly-available-card">
            <p class="monthly-available-label">今月使用可能クレジットカード額</p>
            <p id="availableCredit" class="monthly-available-value">¥0</p>
            <p id="availableCreditMonth" class="monthly-available-note">請求月: --</p>
          </article>
        </section>
      </header>

      <section class="tabs-wrap" aria-label="表示切り替え">
        <button id="tabLedger" class="tab-btn is-active" type="button">家計簿</button>
        <button id="tabBudget" class="tab-btn" type="button">予算案</button>
      </section>

      <div id="ledgerView" class="tab-view">

      <!-- カレンダー表示 -->
      <section class="panel calendar-panel">
        <div class="calendar-header">
          <button id="prevMonth" class="btn btn-small">← 前月</button>
          <h2 id="calendarTitle">2026年3月</h2>
          <button id="nextMonth" class="btn btn-small">次月 →</button>
          <button id="todayMonth" class="btn btn-small btn-today">当月</button>
        </div>
        <div class="calendar-container">
          <div class="calendar-weekdays">
            <div>日</div>
            <div>月</div>
            <div>火</div>
            <div>水</div>
            <div>木</div>
            <div>金</div>
            <div>土</div>
          </div>
          <div id="calendar" class="calendar-grid"></div>
        </div>
        <div id="paymentInfo" class="payment-info"></div>
      </section>

      <!-- 支出入力フォーム -->
      <section class="panel input-panel">
        <h2 id="formTitle">支出を記録</h2>
        
        <div class="form-group">
          <label for="expenseDate">日付</label>
          <input type="date" id="expenseDate" />
        </div>

        <div class="form-group">
          <label for="category">科目</label>
          <select id="category">
            <option value="">選択してください</option>
            <option value="食費">食費</option>
            <option value="外食費">外食費</option>
            <option value="美容">美容</option>
            <option value="雑費">雑費</option>
            <option value="交通">交通</option>
            <option value="ETC">ETC</option>
            <option value="医療">医療</option>
            <option value="その他">その他</option>
          </select>
        </div>

        <div class="form-group">
          <label for="description">内容詳細</label>
          <input type="text" id="description" placeholder="例）スーパー、ドラッグストア など" />
        </div>

        <div class="form-group">
          <label for="amount">金額</label>
          <input type="number" id="amount" placeholder="0" min="0" />
        </div>

        <div class="form-group">
          <label for="cardType">支払い方法</label>
          <select id="cardType">
            <option value="現金">現金</option>
            <option value="イオン">イオンカード</option>
            <option value="d">dカード</option>
          </select>
        </div>

        <div class="form-button-group">
          <button id="addBtn" class="btn btn-primary">記録する</button>
          <button id="cancelBtn" class="btn btn-secondary" hidden>キャンセル</button>
        </div>
      </section>

      <!-- 支出一覧 -->
      <section class="panel history-panel">
        <h2>支出履歴</h2>
        <div id="expenseList" class="expense-list">
          <p class="placeholder">まだ記録がありません</p>
        </div>
      </section>

      <!-- 統計情報 -->
      <section class="panel stats-panel">
        <h2>カード別支出</h2>
        <div id="stats" class="stats-container"></div>
      </section>
      </div>

      <div id="budgetView" class="tab-view" hidden>
        <section class="panel budget-panel">
          <div class="budget-head">
            <h2>月別 予算案</h2>
            <p id="budgetStatus" class="budget-status">自動保存されます</p>
          </div>
          <p id="budgetMonthLabel" class="budget-month-label">対象月: 2026年3月</p>

          <div class="budget-grid">
            <label>給与<input id="budgetSalary" type="number" min="0" placeholder="0" /></label>
            <label>水道費<input id="budgetWater" type="number" min="0" placeholder="0" /></label>
            <label>火災保険<input id="budgetFireInsurance" type="number" min="0" placeholder="0" readonly /></label>
            <label>小規模企業共済<input id="budgetKyosai" type="number" min="0" placeholder="0" readonly /></label>
            <label>電気代<input id="budgetElectricity" type="number" min="0" placeholder="0" /></label>
            <label>ガス代金<input id="budgetGas" type="number" min="0" placeholder="0" /></label>
            <label>家賃<input id="budgetRent" type="number" min="0" placeholder="0" readonly /></label>
            <label>柔術<input id="budgetJiuJitsu" type="number" min="0" placeholder="0" readonly /></label>
            <label>dカード・イオンカード<input id="budgetCards" type="number" min="0" placeholder="0" readonly /></label>
            <label>投資<input id="budgetInvestment" type="number" min="0" placeholder="0" /></label>
            <label>小遣い<input id="budgetAllowance" type="number" min="0" placeholder="0" /></label>
            <label>積み立て<input id="budgetSavings" type="number" min="0" placeholder="0" /></label>
            <p id="budgetSavingsCumulative" class="budget-savings-cumulative">これまでの積み立て合計: ¥0</p>
            <label>固定資産税<input id="budgetPropertyTax" type="number" min="0" placeholder="0" /></label>
            <label class="budget-total">総額<input id="budgetTotal" type="text" readonly /></label>
          </div>
        </section>
      </div>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
